apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paxarisglobal-admin-fashion-ecommerce-website-backend-postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paxarisglobal-admin-fashion-ecommerce-website-backend-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paxarisglobal-admin-fashion-ecommerce-website-backend-postgres
  template:
    metadata:
      labels:
        app: paxarisglobal-admin-fashion-ecommerce-website-backend-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: app
            - name: POSTGRES_USER
              value: app_user
            - name: POSTGRES_PASSWORD
              value: app_password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paxarisglobal-admin-fashion-ecommerce-website-backend-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: paxarisglobal-admin-fashion-ecommerce-website-backend-postgres
spec:
  selector:
    app: paxarisglobal-admin-fashion-ecommerce-website-backend-postgres
  ports:
    - port: 5432
      targetPort: 5432
